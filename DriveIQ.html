function DriveIQMaroc() {
const [ecran,    setEcran]    = useState(0);
const [sal,      setSal]      = useState(””);
const [fonc,     setFonc]     = useState(””);
const [alc,      setAlc]      = useState(””);
const [arev,     setArev]     = useState(””);
const [loyer,    setLoyer]    = useState(””);
const [cred,     setCred]     = useState(””);
const [assur,    setAssur]    = useState(””);
const [achg,     setAchg]     = useState(””);
const [duree,    setDuree]    = useState(60);
const [avecApport, setAvecApport] = useState(false);
const [apportPct,  setApportPct]  = useState(20);
const [cat,      setCat]      = useState(“citadine”);
const [onglet,   setOnglet]   = useState(“ok”);
const [resultat, setResultat] = useState(null);
const [tauxCustom, setTauxCustom] = useState(null);

const totRev = (parseFloat(sal)||0)+(parseFloat(fonc)||0)+(parseFloat(alc)||0)+(parseFloat(arev)||0);
const totChg = (parseFloat(loyer)||0)+(parseFloat(cred)||0)+(parseFloat(assur)||0)+(parseFloat(achg)||0);

function calculer() {
if (totRev <= 0) return;
const taux    = totChg / totRev;
const mensMax = calcMens(totRev, totChg);
setResultat({ taux: taux, mensMax: mensMax });
setTauxCustom(null);
setEcran(3);
}

function apEffectif() { return avecApport ? apportPct : 0; }

function getTaux(mois) {
if (tauxCustom !== null && mois === duree) return tauxCustom / 100;
return TAUX_BANQUES[mois];
}

function scenarioActif() {
if (!resultat) return null;
var tauxAnnuel = getTaux(duree);
var ap  = apEffectif();
var cap = calcCap(resultat.mensMax, tauxAnnuel, duree);
var budget = calcBudget(cap, ap / 100);
var coutTotalCredit = resultat.mensMax * duree;
var interets = Math.max(0, coutTotalCredit - cap);
return { cap: cap, budget: budget, apportMontant: budget * (ap / 100), tauxAnnuel: tauxAnnuel, coutTotalCredit: coutTotalCredit, interets: interets };
}

function calcScenarioBanque(banque) {
if (!resultat) return null;
var t = banque.taux[duree];
var ap = apEffectif();
var cap = calcCap(resultat.mensMax, t, duree);
var budget = calcBudget(cap, ap / 100);
var coutTotal = resultat.mensMax * duree;
var interets = Math.max(0, coutTotal - cap);
var assurMens = cap * banque.assurance / 12;
return { cap: cap, budget: budget, tauxAnnuel: t, coutTotal: coutTotal, interets: interets, assurMens: assurMens, frais: banque.frais, mensualiteTotale: resultat.mensMax + assurMens };
}

function couleurTaux(t) {
if (t > 0.5)  return “#dc2626”;
if (t > 0.4)  return “#ea580c”;
if (t > 0.25) return “#d97706”;
return “#16a34a”;
}
function profilTaux(t) {
if (t > 0.5)  return “Endettement critique”;
if (t > 0.4)  return “Profil tendu”;
if (t > 0.25) return “Profil équilibré”;
return “Profil solide”;
}

function voituresFiltrees() {
var sc     = scenarioActif();
var b      = sc ? sc.budget : 0;
var liste  = VOITURES.filter(function(v) { return v.cat === cat; });
if (onglet === “ok”)    return liste.filter(function(v) { return v.prix <= b; });
if (onglet === “etire”) return liste.filter(function(v) { return v.prix > b && v.prix <= b * 1.2; });
return liste;
}
